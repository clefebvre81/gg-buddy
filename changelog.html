<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GG Buddy Changelog</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: "Lato", Arial, sans-serif;
      background: #111218;
      color: #ececf2;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.5rem;
      font-weight: 800;
    }
    .hint {
      margin: 0 0 18px;
      color: #a7a9b4;
      font-size: 0.9rem;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #181a23;
      border: 1px solid #2a2f45;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.45;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GG Buddy Changelog</h1>
    <p class="hint">This view is bundled with the extension.</p>
    <pre id="changelogContent">Loading changelog…</pre>
  </div>
  <script src="changelog.js"></script>
</body>
</html>
